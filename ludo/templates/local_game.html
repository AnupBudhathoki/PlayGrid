{% extends 'base2.html' %}
{% load static %}

{% block title %}Ludo - Local Game{% endblock %}

{% block content %}
<div class="row mt-2 justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="glass-card mb-4 p-3 d-flex justify-content-between align-items-center">
            <h5 class="mb-0 fw-700">Local Match</h5>
            <button class="btn btn-sm btn-outline-secondary" onclick="window.location.reload()"><i
                    class="bi bi-arrow-clockwise"></i> Restart</button>
        </div>

        <div class="board-container">
            <div id="ludo-board"></div>
        </div>

        <div id="game-status" class="alert alert-info glass-card mt-3 text-center fw-600 d-none">
            Game Status Message here.
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{% static 'game/js/board.js' %}"></script>
<script src="{% static 'game/js/local.js' %}"></script>
{% endblock %}
